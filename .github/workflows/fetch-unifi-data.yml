name: Fetch UniFi Live Data

on:
 schedule:
   - cron: '0 * * * *'
 workflow_dispatch:

permissions:
 contents: write

jobs:
 fetch:
   runs-on: ubuntu-latest
   steps:
     - name: Checkout repo
       uses: actions/checkout@v4

     - name: Set up Python
       uses: actions/setup-python@v5
       with:
         python-version: '3.11'

     - name: Fetch UniFi data
       env:
         UNIFI_API_KEY: ${{ secrets.UNIFI_API_KEY }}
       run: python scripts/fetch_unifi.py

     - name: Commit if changed
       run: |
         git config user.name "github-actions[bot]"
         git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
         git add data/live-data.json
         if git diff --staged --quiet; then
           echo "No changes — skipping commit"
         else
           git commit -m "chore: refresh UniFi live data [skip ci]"
           git push
         fi
